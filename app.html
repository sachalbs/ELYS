<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=1280">
<title>ELYS · Libérez le plein potentiel de l'IA</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=DM+Sans:wght@400;500;600&family=JetBrains+Mono:wght@400;500&family=Syne:wght@800&display=swap" rel="stylesheet">
<style>
  :root{
    --cream:#f5f5f0;
    --cream-2:#ecece5;
    --ink:#000000;
    --body:#374151;
    --muted:#6b7280;
    --rule:#e5e5e5;
    --blue:#1d4ed8;
    --blue-ink:#1538a8;
    --green:#0f7d3a;
    --red:#b3261e;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{background:var(--cream);color:var(--body);font-family:"DM Sans",system-ui,sans-serif;-webkit-font-smoothing:antialiased;font-size:16px;line-height:1.5}
  body{min-width:1280px}
  a{color:inherit;text-decoration:none}
  button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
  input{font-family:inherit;border:none;outline:none;background:none;color:inherit}

  .display{font-family:"Archivo Black",sans-serif;font-weight:900;letter-spacing:-0.02em;color:var(--ink);line-height:0.95}
  .mono{font-family:"JetBrains Mono",ui-monospace,monospace}
  .blu{color:var(--blue)}
  .wrap{max-width:1280px;margin:0 auto;padding:0 48px}
  .wrap.narrow{max-width:980px}

  /* ──────────── NAV ──────────── */
  .nav{border-bottom:1px solid var(--rule);background:var(--cream);position:sticky;top:0;z-index:50}
  .nav-inner{display:flex;align-items:center;justify-content:space-between;height:72px}
  .logo{font-family:"Archivo Black",sans-serif;font-size:24px;letter-spacing:-0.01em;color:var(--ink);display:flex;align-items:baseline;gap:8px}
  .logo::after{content:"";display:inline-block;width:8px;height:8px;background:var(--blue);transform:translateY(-2px)}
  .nav-links{display:flex;align-items:center;gap:40px}
  .nav-link{font-size:14px;font-weight:500;color:var(--ink);padding:6px 0;position:relative}
  .nav-link:hover{color:var(--blue)}
  .nav-link.on{color:var(--blue)}
  .nav-link.on::after{content:"";position:absolute;left:0;right:0;bottom:-4px;height:2px;background:var(--blue)}
  .nav-right{display:flex;align-items:center;gap:20px}
  .lang{display:flex;border:1px solid var(--ink);font-family:"JetBrains Mono",monospace;font-size:12px;font-weight:500}
  .lang button{padding:6px 10px;color:var(--ink);background:var(--cream)}
  .lang button.on{background:var(--ink);color:var(--cream)}
  .lang button + button{border-left:1px solid var(--ink)}

  .cta{display:inline-flex;align-items:center;gap:10px;background:var(--blue);color:#fff;padding:10px 18px;font-weight:600;font-size:14px;border:1px solid var(--blue);transition:background .12s ease}
  .cta:hover{background:var(--blue-ink);color:#fff}
  .cta .arr{font-family:"JetBrains Mono",monospace}
  .big-cta{padding:18px 24px;font-size:15px;width:100%;justify-content:space-between}
  .ghost{display:inline-flex;align-items:center;gap:10px;padding:10px 18px;font-weight:600;font-size:14px;border:1px solid var(--ink);color:var(--ink);background:var(--cream)}
  .ghost:hover{background:var(--ink);color:var(--cream)}
  .ghost.sm{padding:7px 12px;font-size:13px}

  /* ──────────── HERO ──────────── */
  .hero{padding:88px 0 96px;border-bottom:1px solid var(--rule)}
  .hero-meta{display:flex;align-items:center;gap:14px;margin-bottom:36px}
  .hero-meta .dot{width:8px;height:8px;background:var(--blue)}
  .hero-meta .tag{font-family:"JetBrains Mono",monospace;font-size:12px;color:var(--ink);letter-spacing:0.08em;text-transform:uppercase}
  .hero-meta .rule{flex:1;height:1px;background:var(--rule)}
  .hero-meta .ver{font-family:"JetBrains Mono",monospace;font-size:12px;color:var(--muted)}
  .hero-h1{font-size:88px;text-transform:uppercase;line-height:0.92;margin-bottom:28px;text-wrap:balance;max-width:1100px}
  .hero-sub{font-size:20px;color:var(--body);max-width:720px;line-height:1.45;margin-bottom:40px}
  .hero-sub strong{color:var(--ink);font-weight:600}
  .hero-search{max-width:820px}
  .hero-search-note{margin-top:14px;font-family:"JetBrains Mono",monospace;font-size:13px;color:var(--muted)}
  .hero-search-note b{color:var(--ink);font-weight:500}

  /* ──────────── SEARCHBOX ──────────── */
  .sbox{position:relative}
  .sbox-row{display:flex;align-items:stretch;border:1px solid var(--ink);background:#fff;height:72px;padding:0 0 0 28px;gap:18px;transition:border-color .12s}
  .sbox:focus-within .sbox-row{border-color:var(--blue);box-shadow:inset 0 0 0 1px var(--blue)}
  .sbox.big .sbox-row{height:96px;padding:0 0 0 36px;gap:22px}
  .sbox-icon{font-family:"JetBrains Mono",monospace;font-size:28px;color:var(--ink);font-weight:600;display:flex;align-items:center}
  .sbox.big .sbox-icon{font-size:36px}
  .sbox-input{flex:1;font-size:20px;color:var(--ink);font-family:"DM Sans",sans-serif;letter-spacing:-0.01em;align-self:stretch}
  .sbox.big .sbox-input{font-size:26px;font-weight:500}
  .sbox-input::placeholder{color:#9aa0a6}
  .sbox-kbd{display:none}
  .sbox-cta{display:flex;align-items:center;justify-content:center;gap:12px;background:var(--blue);color:#fff;font-family:"DM Sans",sans-serif;font-weight:600;font-size:15px;padding:0 28px;align-self:stretch;border:none;border-left:1px solid var(--blue);cursor:pointer;letter-spacing:-0.01em;white-space:nowrap;transition:background .12s}
  .sbox.big .sbox-cta{font-size:17px;padding:0 36px;gap:14px}
  .sbox-cta:hover{background:var(--blue-ink)}
  .sbox-cta .arr{font-family:"JetBrains Mono",monospace;font-size:18px;line-height:1}
  .sbox.big .sbox-cta .arr{font-size:22px}
  .sbox-drop{position:absolute;left:0;right:0;top:calc(100% - 1px);background:#fff;border:1px solid var(--ink);border-top:none;z-index:40;max-height:420px;overflow:auto}
  .sbox-empty{padding:18px 22px;font-size:14px;color:var(--muted)}
  .sbox-empty b{color:var(--ink);font-weight:600}
  .sbox-item{display:flex;align-items:center;gap:16px;padding:14px 22px;cursor:pointer;border-top:1px solid var(--rule)}
  .sbox-item:first-child{border-top:none}
  .sbox-item.hover{background:var(--cream-2)}
  .sbox-meta{flex:1;min-width:0}
  .sbox-name{font-weight:600;color:var(--ink);font-size:16px}
  .sbox-cat{font-size:12px;color:var(--muted);font-family:"JetBrains Mono",monospace;text-transform:uppercase;letter-spacing:0.06em;margin-top:2px}
  .sbox-go{font-family:"JetBrains Mono",monospace;font-size:12px;color:var(--blue);text-transform:uppercase;letter-spacing:0.06em}
  .sbox-foot{display:flex;justify-content:space-between;padding:10px 22px;font-family:"JetBrains Mono",monospace;font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:0.06em;border-top:1px solid var(--rule);background:var(--cream)}

  /* ──────────── LOGOS BAND (marquee) ──────────── */
  .logos{padding:48px 0 0;border-bottom:1px solid var(--rule)}
  .logos-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:24px}
  .logos-head .lbl{font-family:"JetBrains Mono",monospace;font-size:12px;color:var(--muted);text-transform:uppercase;letter-spacing:0.08em}
  .logos-head .lbl b{color:var(--ink);font-weight:600}
  .marquee{position:relative;border-top:1px solid var(--ink);border-bottom:1px solid var(--ink);overflow:hidden;background:var(--cream);mask-image:linear-gradient(90deg,transparent 0,#000 80px,#000 calc(100% - 80px),transparent 100%);-webkit-mask-image:linear-gradient(90deg,transparent 0,#000 80px,#000 calc(100% - 80px),transparent 100%)}
  .marquee-track{display:flex;align-items:center;gap:0;width:max-content;animation:elys-marquee 140s linear infinite}
  .marquee:hover .marquee-track{animation-play-state:paused}
  .marquee-cell{display:inline-flex;align-items:center;padding:22px 32px;border-right:1px solid var(--rule);text-decoration:none;color:var(--ink);transition:background .12s}
  .marquee-cell:hover{background:#fff}
  @keyframes elys-marquee{from{transform:translateX(0)}to{transform:translateX(-50%)}}

  /* ──────────── SECTION HEAD ──────────── */
  .section-head{padding:96px 0 32px;display:grid;grid-template-columns:1fr 2fr;gap:80px;align-items:end}
  .section-head .eyebrow{font-family:"JetBrains Mono",monospace;font-size:12px;color:var(--blue);text-transform:uppercase;letter-spacing:0.08em}
  .section-head h2{font-size:60px;text-transform:uppercase;color:var(--ink);line-height:0.95}
  .section-head .lede{font-size:17px;color:var(--body);max-width:560px}
  .eyebrow{font-family:"JetBrains Mono",monospace;font-size:12px;color:var(--blue);text-transform:uppercase;letter-spacing:0.08em}

  /* ──────────── HOW TO ──────────── */
  .howto{display:grid;grid-template-columns:repeat(3,1fr);border-top:1px solid var(--ink);border-bottom:1px solid var(--ink)}
  .step{padding:44px 32px 52px;border-right:1px solid var(--rule);position:relative;background:var(--cream)}
  .step:last-child{border-right:none}
  .step .num{font-family:"Archivo Black",sans-serif;font-size:96px;color:var(--blue);line-height:0.9;letter-spacing:-0.02em;margin-bottom:28px}
  .step .htag{font-family:"JetBrains Mono",monospace;font-size:12px;color:var(--muted);text-transform:uppercase;letter-spacing:0.08em;margin-bottom:10px}
  .step h3{font-family:"Archivo Black",sans-serif;font-size:24px;text-transform:uppercase;color:var(--ink);margin-bottom:14px;line-height:1.05}
  .step p{color:var(--body);font-size:15px;line-height:1.55;max-width:300px}
  .step .pin{position:absolute;top:28px;right:32px;font-family:"JetBrains Mono",monospace;font-size:11px;color:var(--muted)}

  /* ──────────── DEMO ──────────── */
  .demo-wrap{padding:80px 0 96px;border-bottom:1px solid var(--rule)}
  .demo{border:1px solid var(--ink);background:var(--cream-2);display:grid;grid-template-columns:1fr 1.4fr;margin-top:40px}
  .demo-head{grid-column:1/-1;display:flex;align-items:center;justify-content:space-between;padding:14px 20px;border-bottom:1px solid var(--ink);background:var(--ink);color:var(--cream)}
  .demo-head .left{display:flex;align-items:center;gap:14px;font-family:"JetBrains Mono",monospace;font-size:12px;letter-spacing:0.06em;text-transform:uppercase}
  .demo-head .dots{display:flex;gap:6px}
  .demo-head .dots span{width:8px;height:8px;background:var(--cream)}
  .demo-head .right{font-family:"JetBrains Mono",monospace;font-size:12px;color:#9aa0a6}
  .demo-head .right b{color:var(--cream);font-weight:500}
  .demo-left{padding:36px;border-right:1px solid var(--ink)}
  .demo-right{padding:36px;background:var(--cream)}
  .role{font-family:"JetBrains Mono",monospace;font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:0.08em;margin-bottom:14px;display:flex;align-items:center;gap:8px}
  .role .sq{width:10px;height:10px;background:var(--ink);display:inline-block}
  .role .sq.b{background:var(--blue)}
  .prompt{font-family:"Archivo Black",sans-serif;font-size:30px;color:var(--ink);line-height:1.1;text-wrap:balance}
  .prompt .b{color:var(--blue)}
  .prompt-meta{margin-top:32px;padding-top:24px;border-top:1px solid var(--rule);display:grid;grid-template-columns:1fr 1fr;gap:20px;font-family:"JetBrains Mono",monospace;font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:0.06em}
  .prompt-meta b{display:block;color:var(--ink);font-family:"DM Sans",sans-serif;font-size:14px;font-weight:600;text-transform:none;letter-spacing:0;margin-top:4px}
  .resp-title{font-family:"Archivo Black",sans-serif;font-size:18px;color:var(--ink);text-transform:uppercase;margin-bottom:18px;display:flex;align-items:center;gap:10px}
  .resp-title .badge,.badge{font-family:"JetBrains Mono",monospace;font-size:10px;background:var(--blue);color:#fff;padding:3px 6px;letter-spacing:0.08em}

  /* table */
  .table{width:100%;border-collapse:collapse;font-size:14px}
  .table th{font-family:"JetBrains Mono",monospace;font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:0.08em;text-align:left;padding:10px 0;border-bottom:1px solid var(--ink);font-weight:500}
  .table th.r,.table td.r{text-align:right}
  .table td{padding:14px 0;border-bottom:1px solid var(--rule);color:var(--ink);font-weight:500;vertical-align:top}
  .table td .sub{display:block;color:var(--muted);font-weight:400;font-size:12px;margin-top:2px}
  .table td .pill{display:inline-block;font-family:"JetBrains Mono",monospace;font-size:10px;padding:3px 6px;border:1px solid var(--ink);text-transform:uppercase;letter-spacing:0.06em}
  .table td .pill.late{background:var(--ink);color:var(--cream)}
  .table tr:last-child td{border-bottom:none}
  .resp-foot{margin-top:18px;display:flex;align-items:center;justify-content:space-between;font-family:"JetBrains Mono",monospace;font-size:11px;color:var(--muted)}
  .resp-foot b{color:var(--ink);font-weight:500}
  .resp-total{font-family:"Archivo Black",sans-serif;font-size:26px;color:var(--ink);margin-top:22px;padding-top:18px;border-top:1px solid var(--ink);display:flex;justify-content:space-between;align-items:baseline}
  .resp-total .lbl{font-family:"JetBrains Mono",monospace;font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:0.08em;font-weight:400}

  /* ──────────── PRICING ──────────── */
  .pricing-wrap{padding:64px 0 96px;border-bottom:1px solid var(--rule)}
  .pricing{display:grid;grid-template-columns:repeat(3,1fr);gap:0;border-top:1px solid var(--ink);margin-top:40px}
  .plan{border-right:1px solid var(--ink);border-bottom:1px solid var(--ink);padding:36px 32px;background:var(--cream);display:flex;flex-direction:column;gap:24px;position:relative}
  .plan:last-child{border-right:1px solid var(--ink)}
  .plan.pro{border:2px solid var(--blue);z-index:2}
  .plan .ptag{font-family:"JetBrains Mono",monospace;font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:0.08em}
  .plan .ptag b{color:var(--ink);font-weight:500}
  .plan .pname{font-family:"Archivo Black",sans-serif;font-size:40px;text-transform:uppercase;color:var(--ink);line-height:1}
  .plan.pro .badge{position:absolute;top:-12px;left:32px}
  .plan .price{display:flex;align-items:baseline;gap:8px;padding-bottom:20px;border-bottom:1px solid var(--rule);flex-wrap:wrap}
  .plan.pro{border:2px solid var(--blue);z-index:2;box-shadow:none}
  .plan.pro .pname{color:var(--blue)}
  .plan .price .v{font-family:"Archivo Black",sans-serif;font-weight:900;font-size:48px;color:var(--ink);line-height:1;letter-spacing:-0.03em;font-feature-settings:"tnum" 1,"lnum" 1}
  .plan .price .strike{font-family:"Archivo Black",sans-serif;font-weight:900;font-size:20px;color:var(--muted);text-decoration:line-through;text-decoration-thickness:2px;margin-right:6px;letter-spacing:-0.02em;font-feature-settings:"tnum" 1,"lnum" 1}
  .billing-toggle{display:inline-flex;border:1px solid var(--ink);background:var(--cream);margin:0 auto 40px;align-self:center}
  .billing-toggle button{padding:10px 20px;font-family:"JetBrains Mono",monospace;font-size:12px;text-transform:uppercase;letter-spacing:0.08em;color:var(--ink);background:transparent;cursor:pointer;border:none;display:inline-flex;align-items:center;gap:8px}
  .billing-toggle button + button{border-left:1px solid var(--ink)}
  .billing-toggle button.on{background:var(--ink);color:var(--cream)}
  .billing-toggle .save{font-family:"JetBrains Mono",monospace;font-size:10px;background:var(--blue);color:#fff;padding:2px 6px;letter-spacing:0.06em}
  .billing-toggle button.on .save{background:var(--cream);color:var(--ink)}
  .billing-wrap{display:flex;justify-content:center;margin-bottom:40px}
  .plan .price .u{font-size:13px;color:var(--muted);white-space:nowrap;font-family:"JetBrains Mono",monospace;text-transform:uppercase;letter-spacing:0.04em}
  .plan .lede{font-size:14px;color:var(--body);line-height:1.5;min-height:42px}
  .plan ul{list-style:none;display:flex;flex-direction:column;gap:12px;padding:8px 0 16px;border-bottom:1px solid var(--rule);margin-bottom:auto}
  .plan ul li{display:flex;gap:12px;align-items:flex-start;font-size:14px;color:var(--ink)}
  .plan ul li::before{content:"";display:inline-block;width:8px;height:8px;background:var(--ink);margin-top:7px;flex-shrink:0}
  .plan.pro ul li::before{background:var(--blue)}
  .plan ul li .meta{display:block;font-size:12px;color:var(--muted);margin-top:2px}
  .plan .pcta{display:flex;align-items:center;justify-content:space-between;padding:14px 18px;border:1px solid var(--ink);color:var(--ink);font-weight:600;font-size:14px;background:var(--cream)}
  .plan .pcta:hover{background:var(--ink);color:var(--cream)}
  .plan.pro .pcta{background:var(--blue);color:#fff;border-color:var(--blue)}
  .plan.pro .pcta:hover{background:var(--blue-ink)}

  /* ──────────── PAGE / SUBPAGES ──────────── */
  .page{padding:48px 0 96px}

  .crumb{font-family:"JetBrains Mono",monospace;font-size:12px;color:var(--muted);text-transform:uppercase;letter-spacing:0.06em;display:flex;align-items:center;gap:10px;margin-bottom:48px;padding-bottom:18px;border-bottom:1px solid var(--rule)}
  .crumb a{color:var(--muted)}
  .crumb a:hover{color:var(--ink)}
  .crumb .cur{color:var(--ink)}
  .crumb .sep{color:var(--rule)}

  /* CONNECTOR PAGE */
  .connect-head{display:grid;grid-template-columns:96px 1fr 360px;gap:48px;align-items:start;padding-bottom:48px;border-bottom:1px solid var(--ink)}
  .ch-meta .ch-eyebrow{display:flex;align-items:center;gap:14px;font-family:"JetBrains Mono",monospace;font-size:12px;color:var(--ink);text-transform:uppercase;letter-spacing:0.08em;margin-bottom:16px}
  .ch-meta .ch-eyebrow .dot{width:8px;height:8px;background:var(--green)}
  .ch-meta .ch-eyebrow .ch-ver{color:var(--muted);margin-left:6px;letter-spacing:0.06em}
  .ch-title{font-size:88px;text-transform:uppercase;margin-bottom:8px;line-height:0.9}
  .ch-cat{font-family:"JetBrains Mono",monospace;font-size:13px;color:var(--blue);text-transform:uppercase;letter-spacing:0.08em;margin-bottom:18px}
  .ch-desc{font-size:18px;color:var(--body);max-width:520px;line-height:1.45}
  .ch-side{display:flex;flex-direction:column;gap:18px}
  .ch-trust{border:1px solid var(--ink);background:var(--cream)}
  .trust-row{display:flex;justify-content:space-between;padding:12px 16px;border-bottom:1px solid var(--rule);font-family:"JetBrains Mono",monospace;font-size:12px;color:var(--muted);text-transform:uppercase;letter-spacing:0.06em}
  .trust-row:last-child{border-bottom:none}
  .trust-row b{color:var(--ink);font-weight:500;font-family:"DM Sans",sans-serif;letter-spacing:0;text-transform:none;font-size:13px}
  .trust-row .trust-k{color:var(--muted)}

  .ch-grid{display:grid;grid-template-columns:1.6fr 1fr;gap:48px;margin-top:48px}
  .ch-section-head{display:flex;align-items:baseline;justify-content:space-between;padding-bottom:18px;border-bottom:1px solid var(--ink);margin-bottom:0}
  .ch-count{font-family:"JetBrains Mono",monospace;font-size:12px;color:var(--muted);text-transform:uppercase;letter-spacing:0.06em}
  .action-list{display:flex;flex-direction:column}
  .action-row{display:grid;grid-template-columns:60px 1fr 120px;align-items:center;padding:18px 0;border-bottom:1px solid var(--rule);gap:16px}
  .action-row:hover{background:var(--cream-2)}
  .action-n{font-family:"JetBrains Mono",monospace;font-size:13px;color:var(--muted);padding-left:4px}
  .action-l{font-size:16px;color:var(--ink);font-weight:500}
  .action-perm{font-family:"JetBrains Mono",monospace;font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:0.06em;text-align:right}
  .action-foot{padding:18px 0 0;font-size:13px;color:var(--muted)}
  .action-foot a{color:var(--blue);text-decoration:underline;text-underline-offset:2px}

  .ch-quote{border:1px solid var(--ink);padding:28px 28px 24px;background:var(--cream);display:flex;flex-direction:column;gap:18px}
  .ch-quote blockquote{font-family:"Archivo Black",sans-serif;font-size:22px;color:var(--ink);line-height:1.2;text-wrap:balance}
  .quote-by{padding-top:18px;border-top:1px solid var(--rule)}
  .qb-name{font-weight:600;color:var(--ink);font-size:14px}
  .qb-role{font-family:"JetBrains Mono",monospace;font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:0.06em;margin-top:2px}

  /* LOGIN */
  .login-head{display:flex;align-items:center;gap:24px;margin-bottom:36px}
  .login-h{font-size:64px;text-transform:uppercase;line-height:0.95;margin-top:6px}
  .prog-wrap{margin-bottom:32px}
  .prog-meta{display:flex;justify-content:space-between;font-family:"JetBrains Mono",monospace;font-size:12px;color:var(--muted);text-transform:uppercase;letter-spacing:0.08em;margin-bottom:8px}
  .prog-meta span:first-child{color:var(--ink);font-weight:500}
  .prog-bar{height:4px;background:var(--rule);position:relative}
  .prog-fill{height:100%;background:var(--blue);transition:width .12s linear}
  .browser{border:1px solid var(--ink);background:#fff}
  .browser-bar{display:flex;align-items:center;gap:14px;padding:12px 18px;border-bottom:1px solid var(--ink);background:var(--cream-2)}
  .browser-bar .dots{display:flex;gap:6px}
  .browser-bar .dots span{width:8px;height:8px;background:var(--ink)}
  .browser-bar .addr{flex:1;font-family:"JetBrains Mono",monospace;font-size:13px;color:var(--ink);background:#fff;padding:6px 12px;border:1px solid var(--rule)}
  .browser-bar .lock{font-family:"JetBrains Mono",monospace;font-size:11px;color:var(--green);text-transform:uppercase;letter-spacing:0.06em}
  .browser-body{position:relative;padding:48px 56px 56px;min-height:380px}
  .browser-stack{display:flex;flex-direction:column;gap:14px;max-width:480px;filter:blur(0.3px);opacity:.65}
  .bw-line{font-family:"Archivo Black",sans-serif;font-size:28px;color:var(--ink);margin-bottom:8px;letter-spacing:-0.01em}
  .bw-lbl{font-family:"JetBrains Mono",monospace;font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:0.08em;margin-bottom:-6px}
  .bw-input{border:1px solid var(--ink);background:#fff;padding:12px 14px;font-size:14px;color:var(--ink);font-family:"JetBrains Mono",monospace}
  .bw-cta{display:inline-flex;align-self:flex-start;background:#0052cc;color:#fff;padding:12px 18px;font-weight:600;font-size:14px;margin-top:8px;border:1px solid #0052cc}
  .bw-note{font-size:12px;color:var(--muted);margin-top:16px;max-width:420px;line-height:1.5}
  .browser-overlay{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:18px;background:rgba(245,245,240,.86);border-top:1px solid var(--rule)}
  .overlay-dot{width:14px;height:14px;background:var(--blue);animation:pulse 1.2s steps(2) infinite}
  @keyframes pulse{0%,50%{opacity:1}51%,100%{opacity:.2}}
  .overlay-text{font-family:"JetBrains Mono",monospace;font-size:13px;color:var(--ink);text-transform:uppercase;letter-spacing:0.08em}

  .login-steps{margin-top:36px;border-top:1px solid var(--ink);border-bottom:1px solid var(--ink)}
  .lstep{display:grid;grid-template-columns:60px 1fr 100px;padding:16px 0;border-bottom:1px solid var(--rule);align-items:center;gap:16px;color:var(--muted)}
  .lstep:last-child{border-bottom:none}
  .lstep.done{color:var(--ink)}
  .lstep.cur{color:var(--ink);background:var(--cream-2)}
  .lstep-n{font-family:"JetBrains Mono",monospace;font-size:13px;padding-left:4px}
  .lstep-l{font-size:15px;font-weight:500}
  .lstep-s{font-family:"JetBrains Mono",monospace;font-size:13px;text-align:right;padding-right:4px}
  .lstep.done .lstep-s{color:var(--green)}
  .lstep.cur .lstep-s{color:var(--blue)}

  .trust-bar{margin-top:36px;border:1px solid var(--ink);display:grid;grid-template-columns:repeat(4,1fr);background:var(--cream)}
  .trust-bar > div{padding:16px 20px;border-right:1px solid var(--rule);display:flex;flex-direction:column;gap:4px}
  .trust-bar > div:last-child{border-right:none}
  .trust-bar .trust-k{font-family:"JetBrains Mono",monospace;font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:0.08em}
  .trust-bar b{color:var(--ink);font-weight:600;font-size:14px}

  /* READY */
  .ready-head{display:grid;grid-template-columns:120px 1fr;gap:36px;align-items:center;margin-bottom:48px;padding-bottom:48px;border-bottom:1px solid var(--ink)}
  .check{width:120px;height:120px;background:var(--green);display:flex;align-items:center;justify-content:center}
  .check-mark{font-family:"Archivo Black",sans-serif;font-size:80px;color:#fff;line-height:1}
  .ready-h{font-size:72px;text-transform:uppercase;line-height:0.95;margin-top:8px;margin-bottom:12px}
  .ready-sub{font-size:18px;color:var(--body);max-width:560px;line-height:1.45}

  .mcp-box{border:1px solid var(--ink);background:var(--cream);margin-bottom:48px}
  .mcp-label{padding:14px 24px;border-bottom:1px solid var(--rule);font-family:"JetBrains Mono",monospace;font-size:12px;color:var(--muted);text-transform:uppercase;letter-spacing:0.08em}
  .mcp-row{display:flex;align-items:stretch;border-bottom:1px solid var(--rule)}
  .mcp-url{flex:1;padding:24px;font-family:"JetBrains Mono",monospace;font-size:22px;color:var(--ink);border-right:1px solid var(--rule);user-select:all}
  .mcp-copy{padding:0 36px;background:var(--ink);color:var(--cream);font-family:"JetBrains Mono",monospace;font-size:14px;text-transform:uppercase;letter-spacing:0.06em;font-weight:500}
  .mcp-copy:hover{background:var(--blue)}
  .mcp-foot{display:flex;justify-content:space-between;padding:12px 24px;font-family:"JetBrains Mono",monospace;font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:0.08em}
  .mcp-foot b{color:var(--ink);font-weight:500}

  .install-grid{display:grid;grid-template-columns:repeat(4,1fr);border-top:1px solid var(--ink);border-bottom:1px solid var(--ink);margin-bottom:48px}
  .install-head{grid-column:1/-1;display:flex;align-items:baseline;justify-content:space-between;padding:18px 24px;border-bottom:1px solid var(--rule);background:var(--cream)}
  .install-tip{font-family:"JetBrains Mono",monospace;font-size:12px;color:var(--muted);text-transform:uppercase;letter-spacing:0.06em}
  .install-card{padding:28px 24px 24px;border-right:1px solid var(--rule);display:flex;flex-direction:column;gap:10px;background:var(--cream)}
  .install-card:last-child{border-right:none}
  .ic-mark{width:48px;height:48px;border:1px solid var(--ink);background:#fff;display:flex;align-items:center;justify-content:center;margin-bottom:8px}
  .ic-name{font-family:"Archivo Black",sans-serif;font-size:22px;color:var(--ink);text-transform:uppercase}
  .ic-sub{font-family:"JetBrains Mono",monospace;font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:0.06em}
  .ic-cmd{font-family:"JetBrains Mono",monospace;font-size:12px;color:var(--ink);background:#fff;border:1px solid var(--rule);padding:10px 12px;margin-top:6px;word-break:break-all}
  .ic-cta{margin-top:auto;display:flex;align-items:center;justify-content:space-between;padding:12px 14px;background:var(--blue);color:#fff;font-size:13px;font-weight:600;border:1px solid var(--blue)}
  .ic-cta:hover{background:var(--blue-ink);color:#fff}

  .test-box{border:1px solid var(--ink);background:#fff;margin-bottom:48px}
  .test-head{display:flex;align-items:baseline;justify-content:space-between;padding:18px 24px;border-bottom:1px solid var(--rule);background:var(--cream)}
  .test-tip{font-family:"JetBrains Mono",monospace;font-size:12px;color:var(--muted);text-transform:uppercase;letter-spacing:0.06em}
  .test-input{display:flex;align-items:center;gap:14px;padding:16px 24px;border-bottom:1px solid var(--rule)}
  .ti-prompt{font-family:"JetBrains Mono",monospace;font-size:18px;color:var(--blue);font-weight:600}
  .test-input input{flex:1;font-size:18px;color:var(--ink);height:36px}
  .ti-go{background:var(--ink);color:var(--cream);padding:10px 18px;font-family:"JetBrains Mono",monospace;font-size:13px;text-transform:uppercase;letter-spacing:0.06em;font-weight:500}
  .ti-go:hover{background:var(--blue)}
  .test-suggest{display:flex;align-items:center;gap:14px;padding:12px 24px;border-bottom:1px solid var(--rule);font-family:"JetBrains Mono",monospace;font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:0.06em}
  .test-suggest a{border:1px solid var(--rule);padding:5px 10px;color:var(--ink)}
  .test-suggest a:hover{border-color:var(--ink)}
  .test-output{padding:28px 24px;min-height:160px}
  .to-empty{font-family:"JetBrains Mono",monospace;font-size:13px;color:var(--muted);text-transform:uppercase;letter-spacing:0.06em}
  .to-busy{font-family:"JetBrains Mono",monospace;font-size:14px;color:var(--ink);text-transform:uppercase;letter-spacing:0.06em}
  .to-busy .ellipsis{color:var(--blue);margin-left:8px}
  .to-card .toc-head{font-family:"Archivo Black",sans-serif;font-size:18px;color:var(--ink);text-transform:uppercase;margin-bottom:16px;display:flex;align-items:center;gap:10px}
  .to-card .table td{padding:12px 0}

  .next-row{display:flex;justify-content:space-between;align-items:center;padding-top:32px;border-top:1px solid var(--rule)}
  .next-row .cta{padding:16px 24px;font-size:15px}

  /* DASHBOARD */
  .dash-head{display:grid;grid-template-columns:1.4fr 1fr;gap:48px;align-items:end;padding-bottom:36px;border-bottom:1px solid var(--ink);margin-bottom:36px}
  .dash-h{font-size:64px;text-transform:uppercase;margin:14px 0 8px;line-height:1}
  .dash-sub{font-size:16px;color:var(--body)}
  .dash-sub b{color:var(--ink);font-weight:600}
  .dash-stats{display:grid;grid-template-columns:repeat(3,1fr);border:1px solid var(--ink);background:var(--cream)}
  .ds-cell{padding:18px 20px;border-right:1px solid var(--rule);display:flex;flex-direction:column;gap:4px}
  .ds-cell:last-child{border-right:none}
  .ds-k{font-family:"JetBrains Mono",monospace;font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:0.08em}
  .ds-v{font-family:"Archivo Black",sans-serif;font-size:32px;color:var(--ink);line-height:1}
  .ds-meta{font-family:"JetBrains Mono",monospace;font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:0.06em}

  .dash-search{margin-bottom:36px;max-width:560px}

  .dash-table{border:1px solid var(--ink);margin-bottom:48px;background:#fff}
  .dt-head, .dt-row{display:grid;grid-template-columns:1.4fr 0.9fr 1.6fr 0.9fr 1fr 1fr;gap:16px;padding:14px 20px;align-items:center}
  .dt-head{background:var(--ink);color:var(--cream);font-family:"JetBrains Mono",monospace;font-size:11px;text-transform:uppercase;letter-spacing:0.08em}
  .dt-row{border-top:1px solid var(--rule);background:#fff}
  .dt-row:hover{background:var(--cream-2)}
  .dt-name{display:flex;align-items:center;gap:14px;font-size:14px;color:var(--ink)}
  .dt-name b{display:block;font-weight:600}
  .dt-cat{display:block;font-family:"JetBrains Mono",monospace;font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:0.06em;margin-top:2px}
  .dt-status{display:flex;align-items:center;gap:8px;font-family:"JetBrains Mono",monospace;font-size:12px;text-transform:uppercase;letter-spacing:0.06em}
  .dt-status .dot{width:8px;height:8px}
  .dt-status.green{color:var(--green)}.dt-status.green .dot{background:var(--green)}
  .dt-status.red{color:var(--red)}.dt-status.red .dot{background:var(--red)}
  .dt-url{font-family:"JetBrains Mono",monospace;font-size:12px;color:var(--ink);user-select:all;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .dt-calls{display:flex;flex-direction:column}
  .dt-calls b{font-family:"Archivo Black",sans-serif;font-size:20px;color:var(--ink);line-height:1}
  .dt-meta{font-family:"JetBrains Mono",monospace;font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:0.06em;margin-top:2px}
  .dt-last{font-family:"JetBrains Mono",monospace;font-size:12px;color:var(--muted);text-transform:uppercase;letter-spacing:0.06em}
  .dt-act{justify-self:end}

  .dash-foot{display:grid;grid-template-columns:1.4fr 1fr;gap:48px}
  .df-block{border:1px solid var(--ink);padding:24px;background:var(--cream)}
  .df-block .eyebrow{margin-bottom:18px}
  .activity{list-style:none;display:flex;flex-direction:column}
  .activity li{display:grid;grid-template-columns:80px 1fr;gap:16px;padding:12px 0;border-top:1px solid var(--rule);font-size:14px;color:var(--ink)}
  .activity li:first-child{border-top:none}
  .activity .mono{font-family:"JetBrains Mono",monospace;font-size:12px;color:var(--muted)}
  .activity b{font-weight:600}
  .suggest-list{display:flex;flex-direction:column;gap:0}
  .suggest{display:flex;align-items:center;gap:14px;padding:14px 0;border-top:1px solid var(--rule)}
  .suggest:first-child{border-top:none}
  .suggest b{font-weight:600;color:var(--ink);font-size:14px}
  .suggest .arr{margin-left:auto;font-family:"JetBrains Mono",monospace;color:var(--blue)}
  .suggest:hover b{color:var(--blue)}

  /* PRICING FAQ */
  .faq{margin-top:48px;padding-top:48px;border-top:1px solid var(--rule)}
  .faq .eyebrow{margin-bottom:24px}
  .faq-list{display:flex;flex-direction:column;border-top:1px solid var(--ink);border-bottom:1px solid var(--ink)}
  .faq-row{display:grid;grid-template-columns:1fr 1.6fr;gap:48px;padding:24px 0;border-bottom:1px solid var(--rule)}
  .faq-row:last-child{border-bottom:none}
  .faq-q{font-family:"Archivo Black",sans-serif;font-size:20px;color:var(--ink);line-height:1.2}
  .faq-a{font-size:15px;color:var(--body);line-height:1.55}

  /* ──────────── INFO / LEGAL / MARKETING PAGES ──────────── */
  .info-head{padding-bottom:48px;border-bottom:1px solid var(--ink);margin-bottom:56px;position:relative}
  .info-h{font-size:88px;text-transform:uppercase;line-height:0.92;margin:18px 0 16px;text-wrap:balance}
  .info-lede{font-size:19px;color:var(--body);max-width:680px;line-height:1.5}
  .draft-pill{position:absolute;top:0;right:0;font-family:"JetBrains Mono",monospace;font-size:11px;color:var(--ink);background:#ffe24a;padding:6px 10px;letter-spacing:0.08em;text-transform:uppercase;border:1px solid var(--ink)}
  .info-body{display:flex;flex-direction:column;gap:48px}
  .info-sec{display:grid;grid-template-columns:120px 1fr;gap:48px;align-items:start;padding-bottom:36px;border-bottom:1px solid var(--rule)}
  .info-sec:last-child{border-bottom:none}
  .info-sec-head{display:flex;flex-direction:column;gap:6px}
  .info-sec-n{font-family:"JetBrains Mono",monospace;font-size:12px;color:var(--blue);text-transform:uppercase;letter-spacing:0.08em}
  .info-sec-h{font-family:"Archivo Black",sans-serif;font-size:22px;color:var(--ink);text-transform:uppercase;line-height:1.1;letter-spacing:-0.01em}
  .info-sec-body{font-size:16px;color:var(--body);line-height:1.6;display:flex;flex-direction:column;gap:14px}
  .info-sec-body p{font-size:16px;color:var(--body);line-height:1.6}
  .info-sec-body b{color:var(--ink);font-weight:600}
  .info-list{padding-left:0;list-style:none;display:flex;flex-direction:column;gap:10px;font-size:16px;color:var(--ink)}
  .info-list li{display:flex;gap:14px;align-items:flex-start;line-height:1.5}
  .info-list li::before{content:"";display:inline-block;width:8px;height:8px;background:var(--ink);margin-top:9px;flex-shrink:0}
  ol.info-list{counter-reset:il}
  ol.info-list li::before{content:counter(il, decimal-leading-zero);counter-increment:il;background:none;width:auto;margin-top:0;font-family:"JetBrains Mono",monospace;font-size:13px;color:var(--blue);font-weight:600;letter-spacing:0.04em}
  .info-link{color:var(--blue);text-decoration:underline;text-underline-offset:3px;font-weight:500}
  .info-link:hover{color:var(--blue-ink)}
  .info-foot{margin-top:48px;padding-top:24px;border-top:1px solid var(--rule);font-size:14px;color:var(--muted);line-height:1.6}
  .info-foot b{color:var(--ink);font-weight:600}

  /* key-value table */
  .kv{display:flex;flex-direction:column;border-top:1px solid var(--rule)}
  .kv-row{display:grid;grid-template-columns:240px 1fr;gap:32px;padding:14px 0;border-bottom:1px solid var(--rule);align-items:baseline}
  .kv-row dt{font-family:"JetBrains Mono",monospace;font-size:12px;color:var(--muted);text-transform:uppercase;letter-spacing:0.06em}
  .kv-row dd{font-size:15px;color:var(--ink);font-weight:500;line-height:1.5}

  /* CHANGELOG */
  .cl-list{display:flex;flex-direction:column}
  .cl-row{display:grid;grid-template-columns:200px 1fr;gap:48px;padding:32px 0;border-bottom:1px solid var(--rule);align-items:start}
  .cl-row:last-child{border-bottom:none}
  .cl-row:first-child{padding-top:0}
  .cl-meta{display:flex;flex-direction:column;gap:8px}
  .cl-ver{font-family:"Archivo Black",sans-serif;font-size:28px;color:var(--blue);letter-spacing:-0.02em;line-height:1}
  .cl-date{font-family:"JetBrains Mono",monospace;font-size:12px;color:var(--muted);text-transform:uppercase;letter-spacing:0.06em}
  .cl-tag{align-self:flex-start;font-family:"JetBrains Mono",monospace;font-size:10px;background:var(--ink);color:var(--cream);padding:3px 7px;letter-spacing:0.08em;text-transform:uppercase;margin-top:4px}

  /* STATUS */
  .status-bar{display:flex;align-items:center;gap:14px;padding:16px 20px;border:1px solid var(--ink);background:var(--cream);margin-bottom:36px;font-family:"JetBrains Mono",monospace;font-size:13px;text-transform:uppercase;letter-spacing:0.06em;color:var(--ink)}
  .status-bar .status-time{margin-left:auto;color:var(--muted)}
  .status-led{width:12px;height:12px;background:var(--green);flex-shrink:0;animation:pulse 1.6s steps(2) infinite}
  .status-led.ok{background:var(--green)}
  .status-grid{display:flex;flex-direction:column;gap:0;border-top:1px solid var(--ink);border-bottom:1px solid var(--ink)}
  .status-svc{padding:20px 0;border-bottom:1px solid var(--rule)}
  .status-svc:last-child{border-bottom:none}
  .status-svc-head{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:10px}
  .status-svc-name{font-weight:600;color:var(--ink);font-size:15px}
  .status-svc-up{font-family:"JetBrains Mono",monospace;font-size:13px;color:var(--green);letter-spacing:0.04em}
  .status-cells{display:grid;grid-template-columns:repeat(90,1fr);gap:2px;height:28px}
  .status-cell{background:var(--green);transition:transform .12s}
  .status-cell:hover{transform:scaleY(1.3)}
  .status-cell.mid{background:#f7b500}
  .status-cell.down{background:var(--red)}
  .status-axis{display:flex;justify-content:space-between;margin-top:6px;font-family:"JetBrains Mono",monospace;font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:0.08em}

  /* CONTACT */
  .contact-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:0;border:1px solid var(--ink);background:var(--cream)}
  .contact-card{padding:24px 28px;border-right:1px solid var(--rule);border-bottom:1px solid var(--rule);display:flex;flex-direction:column;gap:6px}
  .contact-card.wide{grid-column:1 / -1;border-right:none}
  .contact-card:nth-child(2n){border-right:none}
  .contact-k{font-family:"JetBrains Mono",monospace;font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:0.08em}
  .contact-v{font-family:"Archivo Black",sans-serif;font-size:22px;color:var(--ink);text-decoration:none;letter-spacing:-0.01em;line-height:1.25}
  a.contact-v{color:var(--blue)}
  a.contact-v:hover{text-decoration:underline;text-underline-offset:3px}

  /* SECURITY */
  .sec-cols{display:grid;grid-template-columns:1fr 1fr;gap:0;border:1px solid var(--ink);margin-top:8px}
  .sec-col{padding:24px 28px;border-right:1px solid var(--rule);background:var(--cream)}
  .sec-col:last-child{border-right:none}
  .sec-col-h{font-family:"JetBrains Mono",monospace;font-size:11px;text-transform:uppercase;letter-spacing:0.08em;padding:6px 10px;display:inline-block;margin-bottom:16px;color:#fff}
  .sec-col-h.ok{background:var(--green)}
  .sec-col-h.no{background:var(--red)}

  /* LEGAL */
  .legal-list{display:flex;flex-direction:column;gap:0;border-top:1px solid var(--rule)}
  .legal-art{padding:28px 0;border-bottom:1px solid var(--rule);display:grid;grid-template-columns:120px 1fr;gap:48px;align-items:start}
  .legal-art:last-child{border-bottom:none}
  .legal-n{font-family:"JetBrains Mono",monospace;font-size:12px;color:var(--blue);text-transform:uppercase;letter-spacing:0.08em;padding-top:4px}
  .legal-h{font-family:"Archivo Black",sans-serif;font-size:20px;color:var(--ink);text-transform:uppercase;margin-bottom:10px;line-height:1.15}
  .legal-c{font-size:15px;color:var(--body);line-height:1.6;max-width:640px}

  /* FOOTER */
  footer{padding:48px 0 56px;border-top:1px solid var(--rule)}
  .foot-top{display:grid;grid-template-columns:1.2fr 1fr 1fr 1fr;gap:40px;padding-bottom:48px;border-bottom:1px solid var(--rule);margin-bottom:32px}
  .foot-col h4{font-family:"JetBrains Mono",monospace;font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:0.08em;margin-bottom:16px;font-weight:500}
  .foot-col ul{list-style:none;display:flex;flex-direction:column;gap:10px;font-size:14px;color:var(--ink)}
  .foot-col ul li a:hover{color:var(--blue)}
